<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <div class="bg-atmosphere" aria-hidden="true"></div>
  <div class="bg-blueprint" aria-hidden="true"></div>

  <div class="sphere sphere--1" data-parallax="0.02" aria-hidden="true"></div>
  <div class="sphere sphere--2" data-parallax="0.035" aria-hidden="true"></div>
  <div class="sphere sphere--3" data-parallax="0.025" aria-hidden="true"></div>
  <div class="sphere sphere--4" data-parallax="0.015" aria-hidden="true"></div>

  <div class="hud-layer" aria-hidden="true">
    <span class="hud-mark hud-mark--tl">v3.2</span>
    <span class="hud-mark hud-mark--tr">REMOTE<br>47.6062°N</span>
    <span class="hud-mark hud-mark--bl">SYS ACTIVE</span>
    <span class="hud-mark hud-mark--br hud-mark--accent">001</span>
    <span class="hud-mark hud-mark--mid-l">VERSION 03.7</span>
  </div>

  <div class="crop-mark crop-mark--tl" aria-hidden="true"></div>
  <div class="crop-mark crop-mark--tr" aria-hidden="true"></div>
  <div class="crop-mark crop-mark--bl" aria-hidden="true"></div>
  <div class="crop-mark crop-mark--br" aria-hidden="true"></div>
  <div class="scan-line" aria-hidden="true"></div>

  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-brand">KB</p>
      <p class="footer-copy">&copy; {{ 'now' | date: '%Y' }} kailyn brown — built with intent</p>
      <div class="footer-links">
        <a href="#home">home</a>
        <a href="#about">about</a>
        <a href="#projects">work</a>
        <a href="#contact">contact</a>
      </div>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
