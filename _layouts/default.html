<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <!-- Background Orbs -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
  </div>

  <!-- Decorations -->
  <div class="decorations">
    <span class="deco deco--reg-tl">⊕</span>
    <span class="deco deco--version">v2.0</span>
    <span class="deco deco--coords">47.6062°N</span>
    <span class="deco deco--bracket">[ ]</span>
    <span class="deco deco--reg-br">⊕</span>
  </div>

  <!-- Crop Marks -->
  <div class="crop-mark crop-mark--tl"></div>
  <div class="crop-mark crop-mark--tr"></div>
  <div class="crop-mark crop-mark--bl"></div>
  <div class="crop-mark crop-mark--br"></div>

  <!-- Chrome Orbs -->
  <div class="chrome-orb chrome-orb--1"></div>
  <div class="chrome-orb chrome-orb--2"></div>
  <div class="chrome-orb chrome-orb--3"></div>

  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  <footer class="glass-panel">
    <div class="footer-content">
      <p class="footer-logo">KB</p>
      <p>&copy; {{ 'now' | date: '%Y' }} kailyn brown — built with intent</p>
      <div class="footer-links">
        <a href="#home">home</a>
        <a href="#about">about</a>
        <a href="#projects">projects</a>
        <a href="#contact">contact</a>
      </div>
    </div>
  </footer>

  <script>
    // Smooth scroll
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // Parallax orbs
    document.addEventListener('mousemove', (e) => {
      const orbs = document.querySelectorAll('.orb');
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      orbs.forEach((orb, i) => {
        const speed = (i + 1) * 15;
        orb.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
      });
    });

    // Fade-in observer
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
