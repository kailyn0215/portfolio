# BACKGROUND SECTION — Extended story
# ═══════════════════════════════════════════════════════════════
background:
  title: "README.md"
  content: |
    Motivated and detail-oriented IT major seeking opportunities to apply and expand 
    programming, problem-solving, and technical skills in collaborative environments. Currently working 
    as a Software Developer Intern at Kroger in the Search & Personalization department.
    
    My journey into tech started with a personal challenge project where I taught myself Swift/Xcode and created 
    a mobile app to assist patients with aphasia—an experience that showed me the power of technology 
    to help others. That project sparked my passion for building software that makes a real difference.
    
    When I'm not coding, you can find me exploring creative outlets like photography and video editing, 
    modding older devices (such as my Nintendo 3DS, PS Vita, Wii U, and iPhone 4), riding in my VW Beetle,
    or tinkering with my custom-built PC.

